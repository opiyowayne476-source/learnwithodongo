<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnWithOdongo — Exercises</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
</head>
<body>

<div id="sidebar-overlay"></div>
<nav id="sidebar">
  <button id="sidebar-close" class="sidebar-close">✕</button>
  <div class="sidebar-logo">Learn<span>WithOdongo</span></div>
  <ul class="sidebar-nav">
    <li><a href="index.html">🏠 <span>Home</span></a></li>
    <li><a href="documents.html">📄 <span>Documents</span></a></li>
    <li><a href="tutorials.html">🎬 <span>Tutorials</span></a></li>
    <li><a href="exercises.html">📝 <span>Exercises</span></a></li>
    <li class="admin-link"><a href="admin.html">⚙️ <span>Admin</span></a></li>
  </ul>
</nav>

<header id="topbar">
  <button id="menu-btn">☰</button>
  <span class="topbar-title">Learn<span>WithOdongo</span></span>
</header>

<main class="main-content">

  <div class="page-header">
    <h1>📝 Exercises &amp; Quizzes</h1>
    <p>Attempt quizzes below — checkbox quizzes are marked automatically. Download papers to try offline.</p>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active">Online Quizzes</button>
    <button class="tab-btn">Question Papers</button>
  </div>

  <!-- ── Online Quizzes ── -->
  <div class="tab-section active" id="tab-quizzes">
    <div id="quizzes-list">
      <div style="text-align:center;color:var(--muted);padding:80px">Loading quizzes…</div>
    </div>
  </div>

  <!-- ── Downloadable papers ── -->
  <div class="tab-section" id="tab-papers">
    <div id="papers-list">
      <div style="text-align:center;color:var(--muted);padding:80px">Loading question papers…</div>
    </div>
  </div>

</main>

<script src="js/main.js"></script>
<script>
// Tab switching
const tabBtns = document.querySelectorAll('.tab-btn');
const tabSections = document.querySelectorAll('.tab-section');
tabBtns.forEach((btn, i) => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    tabSections.forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    tabSections[i].classList.add('active');
  });
});

function escHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── Load quizzes ────────────────────────────────────────
async function loadQuizzes() {
  try {
    // Fetch quizzes + their questions (answers NOT exposed to students)
    const quizzes = await sbFetch('quizzes?select=id,title,description,created_at');
    const list = document.getElementById('quizzes-list');

    if (!quizzes.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:80px">No quizzes posted yet — check back soon.</div>';
      return;
    }

    list.innerHTML = '';
    for (const quiz of quizzes) {
      // Fetch questions without answers
      const questions = await sbFetch(`quiz_questions?quiz_id=eq.${quiz.id}&select=id,question,options&order=order_num`);
      list.appendChild(buildQuizCard(quiz, questions));
    }
  } catch(e) {
    document.getElementById('quizzes-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:80px">Connect Supabase to load quizzes.</div>';
  }
}

function buildQuizCard(quiz, questions) {
  const card = document.createElement('div');
  card.className = 'quiz-card';
  card.id = 'quiz-' + quiz.id;

  // User answers map: questionId -> array of selected option indices
  const answers = {};

  card.innerHTML = `
    <h3>📋 ${escHtml(quiz.title)}</h3>
    <p class="meta">${escHtml(quiz.description || '')} &nbsp;•&nbsp; ${questions.length} question${questions.length!==1?'s':''} &nbsp;•&nbsp; 📅 ${new Date(quiz.created_at).toLocaleDateString()}</p>
    <div id="questions-${quiz.id}"></div>
    <div style="margin-top:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="submitQuiz('${quiz.id}', ${questions.length})">Submit Answers</button>
      <div id="result-${quiz.id}"></div>
    </div>`;

  const qContainer = card.querySelector('#questions-' + quiz.id);

  questions.forEach((q, qi) => {
    let opts = [];
    try { opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options; } catch { opts = []; }

    const qDiv = document.createElement('div');
    qDiv.style.cssText = 'margin-bottom:22px';
    qDiv.innerHTML = `
      <p style="font-weight:500;margin-bottom:10px;font-size:0.93rem">${qi+1}. ${escHtml(q.question)}</p>
      <div class="quiz-options" id="opts-${q.id}">
        ${opts.map((opt, oi) => `
          <label class="quiz-option" id="opt-${q.id}-${oi}">
            <input type="radio" name="q${q.id}" value="${oi}"
              onchange="toggleOpt('${q.id}', ${oi}, this.checked)"/>
            ${escHtml(opt)}
          </label>`).join('')}
      </div>`;
    qContainer.appendChild(qDiv);
  });

  // Store answer selections per quiz
  card._answers = {};
  card._questions = questions;
  return card;
}

// Track choice selections per card
function toggleOpt(questionId, optionIndex, checked) {
  const opt = document.getElementById(`opt-${questionId}-${optionIndex}`);
  if (!opt) return;

  // Clear selected state for all options in this question when a radio is chosen.
  const group = opt.parentElement;
  if (group) {
    group.querySelectorAll('.quiz-option').forEach(label => label.classList.remove('selected'));
  }
  opt.classList.toggle('selected', checked);
}

// Submit quiz — fetch answers from Supabase and auto-mark
async function submitQuiz(quizId, totalQ) {
  const card = document.getElementById('quiz-' + quizId);
  const resultEl = document.getElementById('result-' + quizId);

  // Collect student answers
  const studentAnswers = {};
  card.querySelectorAll('input[type=checkbox]:checked, input[type=radio]:checked').forEach(cb => {
    const qId = cb.name.replace('q','');
    if (!studentAnswers[qId]) studentAnswers[qId] = [];
    studentAnswers[qId].push(parseInt(cb.value));
  });

  if (!Object.keys(studentAnswers).length) {
    resultEl.innerHTML = '<span style="color:var(--danger);font-size:.88rem">Please answer at least one question.</span>';
    return;
  }

  resultEl.innerHTML = '<span style="color:var(--muted);font-size:.88rem">Marking…</span>';

  try {
    // Fetch the answer key (admin stores answers in quiz_answers table)
    const answerKey = await sbFetch(`quiz_questions?quiz_id=eq.${quizId}&select=id,correct_options&order=order_num`);

    let correct = 0;
    answerKey.forEach(q => {
      let correctOpts = [];
      try { correctOpts = typeof q.correct_options === 'string' ? JSON.parse(q.correct_options) : (q.correct_options || []); } catch {}
      const studentOpts = (studentAnswers[q.id] || []).sort().toString();
      const correctStr  = correctOpts.sort().toString();
      if (studentOpts === correctStr) correct++;
    });

    const answered = answerKey.length;
    const pct = Math.round((correct / answered) * 100);
    const pass = pct >= 50;

    resultEl.innerHTML = `
      <div class="grade-badge ${pass ? 'grade-pass' : 'grade-fail'}">
        ${pass ? '✅' : '❌'} ${correct}/${answered} correct — ${pct}% — ${pass ? 'Pass' : 'Try again'}
      </div>`;

    // Highlight correct/incorrect
    answerKey.forEach(q => {
      let correctOpts = [];
      try { correctOpts = typeof q.correct_options === 'string' ? JSON.parse(q.correct_options) : (q.correct_options || []); } catch {}
      const opts = document.querySelectorAll(`[id^="opt-${q.id}-"]`);
      opts.forEach((opt, oi) => {
        const isCorrect = correctOpts.includes(oi);
        const wasChosen = opt.querySelector('input').checked;
        if (isCorrect)  opt.style.borderColor = 'var(--teal)';
        if (wasChosen && !isCorrect) opt.style.borderColor = 'var(--danger)';
      });
    });

  } catch(e) {
    resultEl.innerHTML = '<span style="color:var(--danger);font-size:.88rem">Could not load answer key. Try again later.</span>';
  }
}

// ── Load downloadable papers ────────────────────────────
async function loadPapers() {
  try {
    const papers = await sbFetch('question_papers?select=*&order=created_at.desc');
    const list = document.getElementById('papers-list');

    if (!papers.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:80px">No question papers uploaded yet.</div>';
      return;
    }

    list.innerHTML = papers.map(p => `
      <div class="doc-card" style="margin-bottom:14px">
        <div class="doc-icon">📝</div>
        <div class="doc-info">
          <h3>${escHtml(p.title)}</h3>
          <p>${escHtml(p.description || '')}</p>
          <p class="doc-meta">📅 ${new Date(p.created_at).toLocaleDateString()}</p>
        </div>
        <div class="doc-actions">
          <a href="${escHtml(p.file_url)}" target="_blank" class="btn btn-secondary btn-sm">👁 View</a>
          <a href="${escHtml(p.file_url)}" download class="btn btn-primary btn-sm">⬇ Download</a>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('papers-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:80px">Connect Supabase to load question papers.</div>';
  }
}

loadQuizzes();
loadPapers();
</script>
</body>
</html>
