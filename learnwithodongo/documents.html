<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnWithOdongo — Documents</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
</head>
<body>

<div id="sidebar-overlay"></div>
<nav id="sidebar">
  <button id="sidebar-close" class="sidebar-close">✕</button>
  <div class="sidebar-logo">Learn<span>WithOdongo</span></div>
  <ul class="sidebar-nav">
    <li><a href="index.html">🏠 <span>Home</span></a></li>
    <li><a href="documents.html">📄 <span>Documents</span></a></li>
    <li><a href="tutorials.html">🎬 <span>Tutorials</span></a></li>
    <li><a href="exercises.html">📝 <span>Exercises</span></a></li>
    <li class="admin-link"><a href="admin.html">⚙️ <span>Admin</span></a></li>
  </ul>
</nav>

<header id="topbar">
  <button id="menu-btn">☰</button>
  <span class="topbar-title">Learn<span>WithOdongo</span></span>
</header>

<main class="main-content">

  <div class="page-header">
    <h1>📄 Documents &amp; Articles</h1>
    <p>Download study materials, research papers, and read articles posted by Jezreel</p>
  </div>

  <!-- Tabs: Documents / Articles -->
  <div class="tab-bar" id="docs-tabs">
    <button class="tab-btn active">Documents</button>
    <button class="tab-btn">Articles &amp; Blogs</button>
  </div>

  <!-- ── Documents tab ── -->
  <div class="tab-section active" id="tab-documents">
    <!-- Search bar -->
    <div style="margin-bottom:20px">
      <input type="text" id="doc-search" class="form-input" placeholder="🔍  Search documents…" style="max-width:360px"/>
    </div>

    <div id="docs-list">
      <div style="text-align:center;color:var(--muted);padding:60px">Loading documents…</div>
    </div>
  </div>

  <!-- ── Articles tab ── -->
  <div class="tab-section" id="tab-articles">
    <div id="articles-list">
      <div style="text-align:center;color:var(--muted);padding:60px">Loading articles…</div>
    </div>
  </div>

</main>

<!-- Article reader modal -->
<div id="article-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;overflow-y:auto;padding:40px 20px">
  <div style="background:white;max-width:720px;margin:0 auto;border-radius:16px;padding:40px;position:relative">
    <button onclick="closeArticle()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted)">✕</button>
    <div id="article-content"></div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
// Tab switching
const tabBtns = document.querySelectorAll('.tab-btn');
const tabSections = document.querySelectorAll('.tab-section');
tabBtns.forEach((btn, i) => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    tabSections.forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    tabSections[i].classList.add('active');
  });
});

function escHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── Load documents ──────────────────────────────────────
let allDocs = [];
async function loadDocs() {
  try {
    allDocs = await sbFetch('documents?select=*&order=created_at.desc');
    renderDocs(allDocs);
  } catch(e) {
    document.getElementById('docs-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:60px">Connect Supabase to load documents.</div>';
  }
}

function renderDocs(docs) {
  const list = document.getElementById('docs-list');
  if (!docs.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:60px">No documents uploaded yet.</div>';
    return;
  }
  list.innerHTML = docs.map(d => `
    <div class="doc-card" style="margin-bottom:14px">
      <div class="doc-icon">${fileIcon(d.type)}</div>
      <div class="doc-info">
        <h3>${escHtml(d.title)}</h3>
        <p>${escHtml(d.description || '')}</p>
        <p class="doc-meta">📁 ${escHtml(d.category || 'General')} &nbsp;•&nbsp; 📅 ${new Date(d.created_at).toLocaleDateString()}</p>
      </div>
      <div class="doc-actions">
        <a href="${escHtml(d.file_url)}" target="_blank" class="btn btn-secondary btn-sm">👁 View</a>
        <a href="${escHtml(d.file_url)}" download class="btn btn-primary btn-sm">⬇ Download</a>
      </div>
    </div>`).join('');
}

function fileIcon(type) {
  if (!type) return '📄';
  if (type.includes('pdf')) return '📕';
  if (type.includes('word') || type.includes('doc')) return '📘';
  if (type.includes('sheet') || type.includes('excel')) return '📗';
  if (type.includes('image')) return '🖼';
  return '📄';
}

// Search
document.getElementById('doc-search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderDocs(allDocs.filter(d =>
    (d.title || '').toLowerCase().includes(q) ||
    (d.description || '').toLowerCase().includes(q) ||
    (d.category || '').toLowerCase().includes(q)
  ));
});

// ── Load articles ───────────────────────────────────────
async function loadArticles() {
  try {
    const arts = await sbFetch('articles?select=*&order=created_at.desc');
    const list = document.getElementById('articles-list');
    if (!arts.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:60px">No articles posted yet.</div>';
      return;
    }
    list.innerHTML = `<div class="card-grid">` + arts.map(a => `
      <div class="article-card" style="cursor:pointer" onclick='openArticle(${JSON.stringify(a)})'>
        <h3>${escHtml(a.title)}</h3>
        <p>${escHtml((a.content || '').slice(0, 150))}…</p>
        <span class="article-meta">📅 ${new Date(a.created_at).toLocaleDateString()}</span>
      </div>`).join('') + `</div>`;
  } catch(e) {
    document.getElementById('articles-list').innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:60px">Connect Supabase to load articles.</div>';
  }
}

function openArticle(a) {
  const content = a.content || '';
  document.getElementById('article-content').innerHTML = `
    <h2 style="font-size:1.4rem;color:var(--navy);margin-bottom:8px">${escHtml(a.title)}</h2>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:24px">📅 ${new Date(a.created_at).toLocaleDateString()}</p>
    <div style="font-size:0.95rem;line-height:1.8;color:var(--text);">${content}</div>`;
  document.getElementById('article-modal').style.display = 'block';
}
function closeArticle() { document.getElementById('article-modal').style.display = 'none'; }

loadDocs();
loadArticles();
</script>
</body>
</html>
